name: Deploy to Vultr VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint + Typecheck
        run: |
          pnpm lint || true
          pnpm typecheck

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/florenza
            git fetch --all
            git reset --hard origin/main
            docker compose up -d --build
            docker compose exec -T app pnpm payload migrate || true
            docker compose exec -T app curl -fsS http://localhost:3000/api/health || exit 1
