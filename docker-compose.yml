services:
  postgres:
    image: postgres:16-alpine
    container_name: florenza-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-florenza}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-florenza_dev}
      POSTGRES_DB: ${POSTGRES_DB:-florenza}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # SECURITY: bind to localhost only — never expose Postgres externally.
    # Docker bypasses UFW, so a "0.0.0.0:5433:5432" mapping would be open
    # to the internet despite UFW rules. Local dev still works because
    # localhost-only binding is reachable from the host. App container
    # talks to postgres over the internal docker network on 5432.
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-florenza}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # SECURITY hardening (same rationale as `app`)
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
      - FOWNER
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    mem_limit: 1g

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: florenza-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    # SECURITY: bind to localhost only — host nginx proxies 443→3000.
    # Public 0.0.0.0:3000 would bypass nginx rate-limiting and TLS.
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - media_uploads:/var/florenza/media
    # SECURITY hardening:
    # - read_only: container FS is read-only. Even if there's an RCE, the
    #   attacker cannot persist a binary into /app, /usr, etc.
    # - tmpfs: writable scratch areas in RAM, mounted noexec — dropped
    #   binaries (e.g. /tmp/let, /var/tmp/lib/ruldalmh from earlier breach)
    #   physically cannot be executed.
    # - cap_drop: ALL + selective add — no SETUID, no NET_RAW, no PTRACE.
    # - no-new-privileges: prevents setuid escalation.
    # - pids_limit: caps process bombs.
    # - mem_limit: prevents resource exhaustion DoS.
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m
      - /var/tmp:rw,noexec,nosuid,nodev,size=16m
      - /var/florenza/media:rw,noexec,nosuid,size=200m
      - /run:rw,noexec,nosuid,size=8m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    mem_limit: 1g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  seed:
    build:
      context: .
      dockerfile: Dockerfile
      target: seed
    container_name: florenza-seed
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    profiles:
      - seed
    # Run via:
    #   docker compose --profile seed run --rm seed pnpm seed:admin
    #   docker compose --profile seed run --rm seed pnpm seed:globals
    #   docker compose --profile seed run --rm seed pnpm seed:demo

  nginx:
    image: nginx:alpine
    container_name: florenza-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    profiles:
      - production

volumes:
  postgres_data:
    driver: local
  media_uploads:
    driver: local
